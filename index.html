<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Hobbyt Equipment</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #d32f2f;
            padding: 20px 0;
            text-align: center;
        }

        header h1 {
            color: white;
            font-size: 36px;
            margin: 0;
        }

        section {
            padding: 60px 20px;
        }

        h2 {
            color: #d32f2f;
            font-size: 28px;
            text-align: center;
            margin-bottom: 40px;
        }

        .product-list {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .product {
            background-color: #333333;
            padding: 20px;
            width: 250px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .product:hover {
            transform: scale(1.05);
        }

        .product img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }

        .product h3 {
            margin: 10px 0;
            font-size: 20px;
        }

        .product p {
            color: #bbb;
            font-size: 14px;
        }

        footer {
            background-color: #121212;
            text-align: center;
            padding: 20px 0;
            color: #bbb;
        }

        footer a {
            color: #d32f2f;
            text-decoration: none;
            font-weight: bold;
        }

    </style>
</head>
<body>

<header>
    <h1>Hobbyt Equipment</h1>
    <p>Your Ultimate Arm Wrestling Gear</p>
</header>

<section>
    <h2>Our Products</h2>
    <div class="product-list">
        <div class="product">
            <img src="handle1.jpg" alt="Arm Wrestling Handle 1">
            <h3>Arm Wrestling Handle 1</h3>
            <p>High-quality, durable handle for training and competitions.</p>
        </div>
        <div class="product">
            <img src="handle2.jpg" alt="Arm Wrestling Handle 2">
            <h3>Arm Wrestling Handle 2</h3>
            <p>Perfect grip for maximum control and power.</p>
        </div>
        <!-- Add more products as necessary -->
    </div>
</section>

<footer>
    <p>© 2026 Hobbyt Equipment | <a href="contact.html">Contact Us</a></p>
</footer>

</body>
</html>
